name: Deploy

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy
        env:
          SSH_USER: root
          SSH_HOST: 91.98.200.140
        run: |
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --delete astro.config.mjs tsconfig.json package.json package-lock.json nginx/ public/ src/ Dockerfile -e "ssh -o StrictHostKeyChecking=no" $SSH_USER@$SSH_HOST:/opt/grobacz.eu/
          ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "cd /opt/traefik && docker compose build grobacz-site && docker compose up -d grobacz-site"