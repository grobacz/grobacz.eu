name: Deploy

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/grob_key
          chmod 600 ~/.ssh/grob_key

      - name: Deploy
        env:
          SSH_USER: root
          SSH_HOST: 91.98.200.140
        run: |
          rsync -az --delete astro.config.mjs tsconfig.json package.json package-lock.json nginx/ public/ src/ Dockerfile $SSH_USER@$SSH_HOST:/opt/grobacz.eu/
          ssh -i ~/.ssh/grob_key -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "cd /opt/traefik && docker compose build grobacz-site && docker compose up -d grobacz-site"